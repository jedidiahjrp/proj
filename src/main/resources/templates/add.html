<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<h1>Add product</h1>
<form th:action="@{/admin/add}" th:object="${product}" method="post">
  <label>Name: <input th:field="*{name}"/></label><br/>
  <label>Description: <input th:field="*{description}"/></label><br/>
  <label>Price: <input type="number" step="0.01" th:field="*{price}"/></label><br/>
  <button type="submit">Save</button>
</form>
<a href="/">Cancel</a>
</body>
</html>
